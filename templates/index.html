<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ObstacleAware — Assistive Navigation</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">ObstacleAware</div>
      <div class="subtitle">Assistive Navigation</div>
    </header>

    <main class="main">
      <div class="camera-container">
        <img id="depthView" alt="Depth view stream" src="" />
      </div>

      <div class="zones">
        <div id="zone-left" class="zone">LEFT</div>
        <div id="zone-centre" class="zone">CENTRE</div>
        <div id="zone-right" class="zone">RIGHT</div>
      </div>

      <div class="controls">
        <label class="slider-label">Sensitivity</label>
        <input id="sensitivity" type="range" min="0" max="255" value="180" />
        <button id="muteBtn" class="mute">Mute</button>
      </div>

      <div id="status" class="status">Status: ready</div>
    </main>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="/static/script.js"></script>
  </body>
</html>
